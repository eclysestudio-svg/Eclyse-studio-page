<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eclyse Studio | Shaping Digital Prestige</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;900&family=Fira+Code:wght@300;400&display=swap');
        
        body { font-family: 'Inter', sans-serif; cursor: none; overflow-x: hidden; background: #000; color: #fff; margin: 0; }
        .hoverable { cursor: none; }
        ::-webkit-scrollbar { width: 0px; background: transparent; }

        /* Background Experience */
        #bg-canvas-container { position: fixed; inset: 0; z-index: -1; overflow: hidden; pointer-events: none; }
        .matrix-overlay { position: absolute; inset: 0; width: 100%; height: 100%; opacity: 0.08; background-image: url("https://img.scryfall.com/cards/large/front/d/e/defa67a5-d57c-473d-bc87-d2e8e453be16.jpg?1562939333"); background-size: cover; }
        .wireframe-text { position: absolute; font-family: 'Fira Code', monospace; font-size: 10px; color: rgba(0, 255, 0, 0.2); white-space: nowrap; user-select: none; }

        /* Physics-based Fluid Glow */
        .mouse-glow {
            position: fixed;
            top: 0;
            left: 0;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(255,255,255,0.12) 0%, transparent 70%);
            border-radius: 50%;
            pointer-events: none;
            z-index: 0;
            will-change: transform;
            filter: blur(40px);
        }

        /* Nav Styling */
        .navbar-blur { background: rgba(15, 15, 15, 0.7); border: 1px solid rgba(255, 255, 255, 0.1); backdrop-filter: blur(12px); border-radius: 24px; padding: 6px 20px; }
        
        /* Cursor */
        .cursor-wrapper { position: fixed; top: 0; left: 0; pointer-events: none; z-index: 9999; mix-blend-mode: difference; }
        .custom-cursor { 
            width: 12px; 
            height: 12px; 
            background: #fff; 
            border-radius: 50%; 
            transform: translate(-50%, -50%); 
            transition: width 0.3s, height 0.3s, border-radius 0.3s;
        }
        .cursor-active { width: 60px; height: 60px; background: transparent; border: 1px solid #fff; }

        /* Roadmap Cards - Sticky Stack */
        .process-card { position: sticky; top: 15vh; height: 70vh; width: 100%; display: flex; align-items: center; justify-content: center; }
        .terminal-style { font-family: 'Fira Code', monospace; background: rgba(255,255,255,0.03); border-left: 2px solid #3f3f46; padding: 1.5rem; font-size: 11px; color: #71717a; }

        /* Footer Banner */
        .white-footer-banner { background: #fff; color: #000; padding: 4rem 2rem; text-align: center; font-weight: 900; text-transform: uppercase; letter-spacing: -0.02em; border-radius: 40px 40px 0 0; }

        .hero-title div { display: inline-block; will-change: transform; }
    </style>
    
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.13.0/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.13.0/ScrollTrigger.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.13.0/ScrollToPlugin.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.13.0/dist/SplitText.min.js"></script>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect, useRef } = React;
        gsap.registerPlugin(ScrollTrigger, ScrollToPlugin, SplitText);

        const handleSmoothScroll = (id) => {
            const element = document.getElementById(id);
            if (element) gsap.to(window, { duration: 1.2, scrollTo: element, ease: "power4.inOut" });
        };

        const Background = () => {
            const containerRef = useRef(null);
            const glowRef = useRef(null);

            useEffect(() => {
                const samples = ["INIT FUTURE;", "BUILD.MAKE.HAPPEN;", "DEPLOYING PRESTIGE;", "DATA_SYNC: OK"];
                for (let i = 0; i < 15; i++) {
                    const span = document.createElement('div');
                    span.className = 'wireframe-text';
                    span.innerText = samples[Math.floor(Math.random() * samples.length)];
                    span.style.left = `${(i / 15) * 100}%`;
                    span.style.top = `-50px`;
                    containerRef.current.appendChild(span);
                    gsap.to(span, { y: window.innerHeight + 200, duration: 15 + Math.random() * 10, repeat: -1, ease: "none", delay: Math.random() * -20, opacity: 0.3 });
                }

                const xTo = gsap.quickTo(glowRef.current, "x", {duration: 0.6, ease: "power3"}),
                      yTo = gsap.quickTo(glowRef.current, "y", {duration: 0.6, ease: "power3"});

                const moveGlow = (e) => {
                    xTo(e.clientX);
                    yTo(e.clientY);
                };
                window.addEventListener('mousemove', moveGlow);
                return () => window.removeEventListener('mousemove', moveGlow);
            }, []);

            return (
                <div id="bg-canvas-container" ref={containerRef}>
                    <div className="matrix-overlay"></div>
                    <div ref={glowRef} className="mouse-glow"></div>
                </div>
            );
        };

        const Nav = ({ isWhiteSection, onContact }) => (
            <nav className="fixed top-0 w-full z-50 p-8 flex justify-between items-center">
                <div className="navbar-blur flex items-center gap-4 hoverable cursor-pointer" onClick={() => window.scrollTo(0,0)}>
                    <img src="image/image_4.png" alt="Eclyse" className="w-10 h-10 object-contain" />
                    <span className="text-xs font-bold tracking-[0.4em] uppercase text-white">Eclyse</span>
                </div>
                <div className={`navbar-blur hidden md:flex gap-8 transition-opacity duration-500 ${isWhiteSection ? 'opacity-0 pointer-events-none' : 'opacity-100'}`}>
                    {['vision', 'work', 'roadmap'].map(id => (
                        <button key={id} onClick={() => handleSmoothScroll(id)} className="text-[9px] font-bold uppercase tracking-widest text-white hover:text-zinc-400 hoverable">{id}</button>
                    ))}
                    <button onClick={onContact} className="text-[9px] font-bold uppercase tracking-widest text-zinc-400 hover:text-white hoverable">Enquire</button>
                </div>
            </nav>
        );

        const Hero = () => {
            const titleRef = useRef(null);
            useEffect(() => {
                const split = new SplitText(titleRef.current, { type: "chars" });
                const chars = split.chars;
                gsap.from(chars, { duration: 1.2, y: 80, opacity: 0, ease: "power4.out", stagger: 0.04 });

                const onMouseMove = (e) => {
                    chars.forEach(char => {
                        const rect = char.getBoundingClientRect();
                        const distX = e.clientX - (rect.left + rect.width / 2);
                        const distY = e.clientY - (rect.top + rect.height / 2);
                        const distance = Math.hypot(distX, distY);
                        if (distance < 120) {
                            const angle = Math.atan2(distY, distX);
                            const push = (120 - distance) / 120;
                            gsap.to(char, { x: Math.cos(angle) * push * -25, y: Math.sin(angle) * push * -25, rotation: (Math.cos(angle) * push * -25) * 0.2, duration: 0.4 });
                        } else {
                            gsap.to(char, { x: 0, y: 0, rotation: 0, duration: 0.6, ease: "elastic.out(1, 0.5)" });
                        }
                    });
                };
                window.addEventListener('mousemove', onMouseMove);
                return () => window.removeEventListener('mousemove', onMouseMove);
            }, []);

            return (
                <section className="h-screen flex flex-col justify-center px-8 md:px-24">
                    <h1 ref={titleRef} className="text-[14vw] md:text-[9vw] font-black leading-[0.85] tracking-tighter uppercase text-white pointer-events-none">
                        Shaping<br/><span className="text-zinc-500">Digital</span><br/>Prestige.
                    </h1>
                </section>
            );
        };

        const Roadmap = () => {
            const cards = [
                { step: "01", title: "Discovery", msg: "> INIT FUTURE;\n> MAPPING DNA...\n> STATUS: READY", desc: "Bridging ambition and reality." },
                { step: "02", title: "Design", msg: "> EXEC PRESTIGE.EXE;\n> VISUALS: LOADED;\n> STATUS: SECURE", desc: "Refining the aesthetic blueprint." },
                { step: "03", title: "Scale", msg: "> MAKE IT HAPPEN;\n> DEPLOYING SYSTEM;\n> STATUS: LIVE", desc: "Executing the final deployment." }
            ];
            return (
                <section id="roadmap" className="px-8 md:px-24 py-24">
                    <h2 className="text-[10px] font-bold uppercase tracking-[0.5em] mb-24 text-zinc-500">The Roadmap</h2>
                    <div className="space-y-[40vh] pb-[20vh]">
                        {cards.map((card, i) => (
                            <div key={i} className="process-card">
                                <div className="w-full max-w-5xl bg-zinc-900/40 backdrop-blur-3xl border border-white/5 p-12 md:p-20 flex flex-col md:flex-row gap-12 items-center rounded-2xl">
                                    <div className="flex-1">
                                        <span className="font-mono text-zinc-600 text-xs mb-4 block">// PHASE_{card.step}</span>
                                        <h3 className="text-6xl md:text-8xl font-black uppercase tracking-tighter mb-4 text-white">{card.title}</h3>
                                        <div className="terminal-style whitespace-pre">{card.msg}</div>
                                    </div>
                                    <div className="w-px h-64 bg-white/5 hidden md:block"></div>
                                    <div className="flex-1 md:pl-12 text-right md:text-left">
                                        <p className="text-zinc-400 text-sm leading-relaxed uppercase tracking-widest">{card.desc}</p>
                                    </div>
                                </div>
                            </div>
                        ))}
                    </div>
                </section>
            );
        };

        const App = () => {
            const [isWhiteSection, setIsWhiteSection] = useState(false);
            const [isModalOpen, setIsModalOpen] = useState(false);

            useEffect(() => {
                const cursor = document.querySelector('.custom-cursor');
                const xTo = gsap.quickTo(".cursor-wrapper", "x", {duration: 0.3}),
                      yTo = gsap.quickTo(".cursor-wrapper", "y", {duration: 0.3});
                window.addEventListener('mousemove', (e) => { xTo(e.clientX); yTo(e.clientY); });

                document.querySelectorAll('.hoverable').forEach(el => {
                    el.addEventListener('mouseenter', () => cursor.classList.add('cursor-active'));
                    el.addEventListener('mouseleave', () => cursor.classList.remove('cursor-active'));
                });

                ScrollTrigger.create({
                    trigger: "#contact-section",
                    start: "top center",
                    onEnter: () => setIsWhiteSection(true),
                    onLeaveBack: () => setIsWhiteSection(false),
                });
            }, []);

            return (
                <div className="relative">
                    <Background />
                    <div className="cursor-wrapper hidden md:block"><div className="custom-cursor"></div></div>
                    <Nav isWhiteSection={isWhiteSection} onContact={() => setIsModalOpen(true)} />
                    
                    <main>
                        <Hero />
                        <section id="vision" className="py-32 px-8 md:px-24">
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-px bg-white/5 border border-white/5">
                                {["Brand Architecture", "Bespoke Engineering", "Visual Direction", "Digital Ecosystems"].map((s, i) => (
                                    <div key={i} className="p-16 bg-black/40 border border-white/5 hover:bg-zinc-900 transition-colors hoverable group">
                                        <h3 className="text-3xl md:text-5xl font-light text-white">{s}</h3>
                                    </div>
                                ))}
                            </div>
                        </section>

                        <section id="work" className="py-32 px-8 md:px-24">
                            <div className="grid grid-cols-2 md:grid-cols-4 gap-4">
                                {[1,2,3,4].map(i => (
                                    <div key={i} className="aspect-video bg-zinc-900/50 border border-white/5 rounded-lg overflow-hidden hoverable group">
                                        <img src={`https://images.unsplash.com/photo-${i === 1 ? '1618005182384-a83a8bd57fbe' : i === 2 ? '1604871000636-074fa5117945' : i === 3 ? '1550684848-fac1c5b4e853' : '1620641788421-7a1c342ea42e'}?auto=format&fit=crop&q=80&w=800`} className="w-full h-full object-cover grayscale group-hover:grayscale-0 transition-all duration-700" />
                                    </div>
                                ))}
                            </div>
                        </section>

                        <Roadmap />

                        <section id="contact-section" className="white-footer-banner mx-8 md:mx-24 mb-24 relative overflow-hidden">
                            <h2 className="text-[10vw] leading-none mb-12">LET'S CREATE<br/>GET IN TOUCH</h2>
                            <button onClick={() => setIsModalOpen(true)} className="px-12 py-6 bg-black text-white text-xs font-bold uppercase rounded-full hover:scale-110 transition-transform hoverable">Start Project</button>
                        </section>
                    </main>

                    <footer className="pt-32 pb-12 px-8 md:px-24 border-t border-white/5">
                        <div className="flex flex-col md:flex-row justify-between items-end gap-16 mb-24">
                            <h2 className="text-4xl font-bold uppercase tracking-tighter text-white">Ready to define <br /><span className="text-zinc-500">the future?</span></h2>
                            <div className="flex flex-col gap-4">
                                <span className="text-[10px] font-bold uppercase text-zinc-600 tracking-[0.2em]">Socials</span>
                                <a href="https://www.instagram.com/eclysestudio/" target="_blank" className="text-xs uppercase text-white hover:text-zinc-400 hoverable transition-colors">Instagram</a>
                                <a href="https://www.linkedin.com/in/eclyse-studio-b37bb73a1/" target="_blank" className="text-xs uppercase text-white hover:text-zinc-400 hoverable transition-colors">LinkedIn</a>
                                <a href="https://x.com/EclyseStudio" target="_blank" className="text-xs uppercase text-white hover:text-zinc-400 hoverable transition-colors">X / Twitter</a>
                            </div>
                        </div>
                        <div className="flex justify-between items-center pt-8 border-t border-white/5 text-[9px] font-mono text-zinc-700 uppercase tracking-[0.2em]">
                            <span>© 2026 Eclyse Studio</span>
                            <span>DATA_SYNC: SUCCESSFUL</span>
                        </div>
                    </footer>

                    {isModalOpen && (
                        <div className="fixed inset-0 z-[100] flex items-center justify-center p-6">
                            <div className="absolute inset-0 bg-black/95 backdrop-blur-sm" onClick={() => setIsModalOpen(false)} />
                            <div className="relative w-full max-w-xl bg-[#0a0a0a] border border-white/10 p-12 text-center rounded-2xl">
                                <h2 className="text-4xl font-bold uppercase tracking-tighter mb-12 text-white">Start the Journey</h2>
                                <div className="grid gap-4">
                                    <a href="https://cal.com/eclyse-studio-hm5slz/15min" target="_blank" className="flex items-center justify-between p-6 bg-white text-black font-bold uppercase text-[10px] hoverable">Book Call</a>
                                    <a href="https://contra.com/eclyse_studio_p8xb9g3h/work" target="_blank" className="flex items-center justify-between p-6 border border-white/10 text-white font-bold uppercase text-[10px] hover:bg-white hover:text-black transition-all hoverable">Hire on Contra</a>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
